server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Internal listen port (80) doesn't match host-mapped or public port,
  # so nginx must emit relative Location headers — otherwise the auto
  # trailing-slash redirect points at http://host/path and breaks.
  absolute_redirect off;

  # Serve clean URLs: /docs/intro -> /docs/intro/index.html (Docusaurus
  # builds trailing-slash directories with index.html inside).
  location / {
    try_files $uri $uri/ $uri.html =404;
  }

  # Long-cache the hashed asset bundles
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Don't cache HTML — content can change between deploys
  location ~* \.html$ {
    add_header Cache-Control "no-cache";
  }

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  error_page 404 /404.html;
}
