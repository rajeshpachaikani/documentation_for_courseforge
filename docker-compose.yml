name: coursemaker-docs

services:
  docs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coursemaker-docs
    restart: unless-stopped
    ports:
      - "127.0.0.1:${DOCS_HOST_PORT:-4220}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
